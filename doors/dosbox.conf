# DirtyFork BBS - DOSBox-X base configuration for door games
#
# This file is loaded first when running any door game.  The BBS then
# overlays a small per-session config containing the [serial] nullmodem
# setup and the [autoexec] drive mounts / launch command.
#
# Sections you are most likely to want to customise:
#   [dosbox]  - machine type, memory
#   [cpu]     - speed (cycles)
#   [sdl]     - window size / output method
#   [render]  - aspect ratio / scaler
#
# Do NOT put [serial] or [autoexec] here; they are generated per session.

[dosbox]
# svga_s3 gives 2 MB VRAM and good compatibility.  Use 'vgaonly' for
# maximum DOS compatibility or 'svga_et4000' for some games that need it.
machine=svga_s3
memsize=16

[cpu]
core=auto
cputype=pentium
# 'auto' scales to host speed.  Set a fixed number (e.g. cycles=50000)
# if a door game runs too fast.
cycles=auto
cycleup=10
cycledown=20

[sdl]
# startminimized=true keeps DOSBox-X out of the way on a server.
# True headless mode is not available in the SDL1 Windows build.
startminimized=true
fullscreen=false
fulldouble=false
fullresolution=original
windowresolution=640x480
# "none" = true headless on SDL2 builds; SDL1 builds ignore it and fall back to surface
output=none
autolock=false
sensitivity=100
waitonerror=false
priority=higher,normal
mapperfile=
usescancodes=false

[render]
frameskip=0
aspect=false
scaler=none

[mixer]
nosound=true
rate=22050
blocksize=1024
prebuffer=20

[midi]
mpu401=none
mididevice=none

[sblaster]
sbtype=none

[gus]
gus=false

[speaker]
pcspeaker=false
tandy=off
disney=false

[dos]
xms=true
ems=true
umb=true
keyboardlayout=us

[ipx]
ipx=false
