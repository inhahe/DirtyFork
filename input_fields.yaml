# Input field style definitions.
# These control colors, borders, and sizing of input fields throughout the BBS.

input_field:
  outline: false
  height: 1
  margin_char: "|"
  blank:
    char: 176  # CP437 light shade — fills unused space; set to null for spaces
    fg: white
    fg_br: false
    bg: blue
    br_bg: false
  content:
    fg: white
    fg_br: false
    bg: black
    bg_br: false
    active:
      fg: green
      bg: black
      fg_br: true
      bg_br: false

input_command:
  height: 1
  outline: false
  content:
    fg: green
    br_fg: false
    bg: black
    br_bg: false
    max_length: null
  width_from_end: 0  # characters short of screen edge; if set, length is ignored
  height_from_end: null
  content_length: 300

input_box:
  outline:
    fg: green
    bg: black
    fg_br: false
    bg_br: false
    double_lined: false
    active:
      fg: green
      bg: black
      fg_br: true
      bg_br: false
  content:
    fg: white
    fg_br: false
    bg: black
    bg_br: false
    active:
      fg: white
      fg_br: false
      bg: black
      bg_br: false

submit:
  width: 7
  height: 1
  text: "Submit"
  outline:
    fg: green
    double_lined: false
    fg_br: false
    bg: black
    bg_br: false
    active:
      fg: green
      fg_br: true
      bg: black
      bg_br: false
  content:
    fg: white
    fg_br: false
    bg: black
    bg_br: false
    active:
      fg: white
      fg_br: true
      bg: black
      bg_br: false
