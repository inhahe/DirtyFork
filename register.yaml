# Registration form field definitions.
# length/height = field display size; max_length = maximum content length.

label: Enter your information to register.
screen_path: null

handle:
  type: input_field
  label: "Handle: "
  chars: 'A-Za-z0-9_,\.\-'
  allowed_chars: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ-_0123456789"
  max_length: 29
  min_length: 1
password:
  label: "Password: "
  type: input_field
  blurb: "Note that a password of four easily rememberable words is more secure than an 11-character password full of special characters. (See https://xkcd.com/936/.) Minimum length: 6"
  row: null
  col: null
  height: 1
  width: 50
  min_length: 6
  max_length: 49
age:
  label: "Age: "
  type: input_field
  width: 11
  max_length: 10
sex:
  label: "Sex: "
  type: input_field
  re: null
  max_length: 10
  width: 11
location:
  label: "Location: "
  type: input_field
  re: null
  max_length: 100
  row: null
  col: null
  width: 50
time_zone:
  label: "Time zone: "
  blurb: "Enter a time zone abbreviation (e.g. EST, PST, UTC) or UTC offset (e.g. UTC+8, UTC-5:30)."
  type: input_field
  max_length: 10
  width: 11
email:
  label: "Email address: "
  type: input_field
  max_length: 100
  chars: 'A-Za-z0-9\._%\+\-@'
  row: null
  col: null
  width: 50
  height: null
bio:
  label: "Bio: "
  type: input_field
  width: 50
  max_length: 400
