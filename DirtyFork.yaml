# DirtyFork BBS — main configuration file
#
# Copy this file to your data directory (or use --data-dir) and edit as needed.
# Any value not present here returns null; most settings have sensible defaults.

bbs_name: My BBS
sysop_name: Sysop
sysop_handle: ""   # handle that automatically receives the 'sysop' key on login
hostname: 0.0.0.0   # bind on all interfaces; set to a specific IP to restrict
port: 23

# BBS info screen (shown from main menu "About" option)
# bbs_location: ""           # city/state/country
# bbs_description: ""        # short description of the BBS
# bbs_phone: ""              # modem phone number(s)
# bbs_website: ""            # website URL
# bbs_established: ""        # year established
# bbs_info_screen: ""        # path to .ans or .bin file (shown instead of auto-generated info)

# Menu layout compactness: how much to prefer shorter/wider over taller/narrower.
# 1.0 = balanced. >1 = more columns (shorter). <1 = fewer columns (taller).
menu_compactness: 1.0

min_edit_width: 10  # minimum characters reserved for editing when quote margins get deep

# Idle timeout in seconds (0 = disabled). Separate values for telnet and modem.
idle_timeout: 0
# Seconds before timeout to show "are you still there?" warning (0 = no warning, just disconnect)
idle_warning: 30

# Modem/serial support (optional — comment out to disable)
# modem:
#   baudrate: 115200        # serial port speed, not modem line speed — 115200 is ideal
#                           # because modem compression can exceed the line rate
#   init_string: ATZ        # default AT init command for all ports
#   idle_timeout: 300       # modem idle timeout in seconds (0 = disabled)
#   ports:
#     - port: COM1
#     - port: COM2
#     - port: COM3
#       baudrate: 115200    # per-port override
#   # Legacy single-port format also supported:
#   # port: COM1

database: DirtyFork.db
files_dir: files
files_meta: files/meta.yaml   # maps filename -> {keys: [...], description: "..."}
file_tags:                     # sysop-defined list of valid file tags
  - game
  - utility
  - dos
  - windows
  - art
  - music
  - document
  - programming
  - communication
  - demo
  - bbs
  - adult
user_configs: user_configs

# bcrypt cost factor for password hashing. Higher = more secure but slower.
# Approximate times: 4=1ms, 6=3ms, 8=13ms, 10=50ms, 12=200ms (default bcrypt is 12)
# Existing passwords are re-hashed at this cost on next login.
bcrypt_rounds: 8

login:
  type: func
  target: login

log:
  path: DirtyFork.log
  split_at: 1_000_000
  max_length: 10_000_000
  max_age: "1 year"

input_fields: !include input_fields.yaml

user_defaults:
  main:
    destination: main
    menu_item: null
  menus:
    main: main
    colors:
      normal:
        fg: white
        fg_br: false
        bg: black
        bg_br: false
      noaccess:
        fg: black
        fg_br: true
        bg: black
        bg_br: false
      highlight:
        fg: white
        fg_br: true
        bg: black
        bg_br: false
  allow_door_popups: true  # allow BBS messages/popups to interrupt door sessions
  keys:
    - doors  # all users can access doors by default; add 'banned' key to block individuals

# Known keys: sysop, debug, doors, banned
# Key groups: a key that grants all keys in its list.
# Groups can include other groups (resolved recursively).
# Example: a user with "sysop" effectively has doors, debug, etc.
key_groups:
  sysop: [doors, debug]

destinations:
  main:
    type: menu
  door:
    type: module
    white_keys: [doors]
    # Path to your DOSBox-X executable:
    dosbox_path: C:\dosbox-x\dosbox-x.exe
    base_path: doors  # relative paths in door configs are relative to this directory
    max_nodes: 20
  teleconference:
    type: module
    # log: teleconference.log  # uncomment to log all teleconference messages
  messages:
    type: menu
  message:
    type: module
  forum:
    type: module
  files:
    type: menu
  file:
    type: module
  register:
    type: module
  settings:
    type: module
  sysop:
    type: menu
    white_keys: [sysop]
  sysop_module:
    type: module
    white_keys: [sysop]
  help:
    type: module
  oneonone:
    type: module
  bbsinfo:
    type: module
  user_info:
    type: module
  whos_online:
    type: module
  user_list:
    type: module
  user_director:
    type: func
  forums:
    type: menu
  all_forums:
    type: menu
  doors:
    type: menu
    white_keys: [doors]

forum_list: &forum_list
  General: null
  # Add more forums here, or remove/rename these.
  # You can add white_keys/black_keys per forum for access control.

menu_system:
  main:
    screen_path: null
    inputs:
      option:
        row: null
        col: null
        length: null
    white_keys: []
    black_keys: []
    options:
      Help:
        target: help
        type: module
      Messages:
        target: messages
        type: menu
      Teleconference:
        target: teleconference
        type: module
      Doors:
        target: doors
        type: menu
        screen_path: null
      Forums:
        target: forums
        type: menu
      File Library:
        target: files
        type: menu
      Lookup:
        target: user_info
        type: module
      Who's Online:
        target: whos_online
        type: module
      Users:
        target: user_list
        type: module
      Settings:
        target: settings
        type: module
      About:
        target: bbsinfo
        type: module
      Sysop:
        target: sysop
        type: menu
        white_keys: [sysop]
  forums:
    option_defaults:
      options:
        option_defaults:
          target: forum
          menu_item: [.., .]   # (forum_name, action_name) — .. = parent, . = self
        New Posts:
          action: new
        Compose:
          action: compose
        Search:
          action: search
    options:
      All Forums:
        target: all_forums
      <<: *forum_list
  all_forums:
    options:
      New Posts:
        target: forum
        menu_item: ["*", new]
      Search:
        target: forum
        menu_item: ["*", search]
  doors:
    option_defaults:
      target: door
      dosbox_conf: doors/dosbox.conf  # default DOSBox-X base config; override per door
      # Shared values — any scalar here becomes a {variable} in dropfile sections.
      # Override per door to affect every format at once.
      security_level: "0"         # used by all formats
      ansi: "1"                   # ANSI capable; used by dorinfo, chain_txt, callinfo_bbs, sfdoors_dat
      home_phone: ""              # used by door_sys and callinfo_bbs
      expiration_date: "01/01/00" # used by door_sys and callinfo_bbs
      user_record: "1"            # used by door_sys, callinfo_bbs, door32_sys
      door_sys:    !include doors/dropfiles/door_sys.yaml
      dorinfo:     !include doors/dropfiles/dorinfo.yaml
      chain_txt:   !include doors/dropfiles/chain_txt.yaml
      callinfo_bbs: !include doors/dropfiles/callinfo_bbs.yaml
      door32_sys:  !include doors/dropfiles/door32_sys.yaml
      sfdoors_dat: !include doors/dropfiles/sfdoors_dat.yaml
    options:
      # Example door entries — edit paths and commands to match your installation.
      # DOSBox drive mapping: C:\ = node dir (dropfiles), D:\ = game dir (EXE).
      # Game commands run from D:\. Dropfile path for game config: C:\DOOR.SYS
      # --- DOS 16-bit doors (via DOSBox-X) ---
      # communication_type: COM (default) — uses DOSBox FOSSIL/serial emulation
      # Trade Wars 2002:
      #   max_nodes: 4
      #   white_keys: [doors]
      #   black_keys: [banned]
      #   communication_type: COM
      #   command: 'TW2002.EXE TWNODE={node}'
      #   dir: 'tw2002'
      # Legend of the Red Dragon:
      #   max_nodes: 10
      #   white_keys: [doors]
      #   black_keys: [banned]
      #   communication_type: COM
      #   command: 'START.BAT {node}'
      #   dir: 'lord'
      Legend of the Red Dragon:
        max_nodes: 10
        white_keys: [doors]
        black_keys: [banned]
        communication_type: COM
        dropfile_type: DOOR.SYS
        command: 'START.BAT {node}'
        dir: 'lord_demo'
      # --- Native 32-bit doors (no DOSBox) ---
      # native: true — runs directly, uses SOCKET (TCP) or STDIO
      # My 32-bit Door:
      #   native: true
      #   communication_type: SOCKET  # or STDIO; default is SOCKET when native=true
      #   command: 'mydoor.exe -socket {socket_port} -node {node}'
      #   dir: 'mydoor'
      1 - Test Door (FOSSIL):
        max_nodes: 10
        communication_type: COM
        command: 'TESTDOOR.EXE /FOSSIL /PORT:0'
        dir: 'testdoor'
      2 - Test Door (BIOS):
        max_nodes: 10
        communication_type: COM
        command: 'TESTDOOR.EXE /BIOS /PORT:0'
        dir: 'testdoor'

  files:
    option_defaults:
      target: file
    options:
      Search:
        action: search
      Browse:
        action: browse
      List All:
        action: list
      Download:
        action: download
      Upload:
        action: upload
  messages:
    option_defaults:
      target: message
    options:
      New Messages:
        action: new
      Compose:
        action: compose
      Search:
        action: search
  sysop:
    option_defaults:
      target: sysop_module
    options:
      Keys:
        action: user_keys
      Groups:
        action: key_groups
      Edit User:
        action: user_settings
